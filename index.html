<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوصلة هدايه - النظام المحمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #040924;
            --gold-primary: #D4AF37;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--royal-blue); margin: 0; overflow-x: hidden; }
        
        /* شاشة تسجيل الدخول - تصميم الصورة */
        #auth-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--royal-blue); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { width: 90%; max-width: 400px; text-align: center; }
        .logo-box {
            width: 80px; height: 80px; background: white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 40px; border: 2px solid var(--gold-primary);
        }
        .logo-text { font-size: 40px; font-weight: 900; color: var(--royal-blue); }
        
        .auth-input {
            width: 100%; padding: 15px; margin: 10px 0; background: transparent;
            border: none; border-bottom: 2px solid var(--gold-primary);
            color: white; text-align: center; font-size: 18px; outline: none;
        }
        .btn-gold {
            width: 100%; padding: 15px; background: var(--gold-primary);
            color: var(--royal-blue); border-radius: 30px; border: none;
            font-weight: 900; font-size: 18px; margin-top: 30px; cursor: pointer;
        }

        /* تنسيقات البوصلة الأصلية */
        .dark-card { background-color: #00002A; color: white; border-radius: 40px; border: 1px solid var(--gold-primary); }
        .stat-card { padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .stat-card .value { font-size: 34px; font-weight: 900; color: var(--gold-primary); }
        .white-card { background: white; border-radius: 35px; padding: 25px; }
        #side-menu { transition: 0.4s; transform: translateX(100%); }
        #side-menu.open { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="login-box">
            <div class="logo-box"><span class="logo-text">H</span></div>
            <input type="email" id="email" class="auth-input" placeholder="البريد الإلكتروني">
            <input type="password" id="password" class="auth-input" placeholder="كلمة السر">
            <button class="btn-gold" onclick="handleLogin()">دخول</button>
            <p id="auth-message" class="text-red-500 mt-4 text-sm"></p>
        </div>
    </div>

    <div id="product-content" class="hidden">
        <div id="overlay" class="fixed inset-0 bg-black/60 hidden z-[90]" onclick="toggleMenu()"></div>

        <div id="side-menu" class="fixed top-0 right-0 h-full w-[100px] bg-white z-[100] flex flex-col items-center pt-24 border-l border-gold-primary">
            <div class="nav-icon-link p-4 mb-4 bg-slate-100 rounded-xl" onclick="showSection('dashboard')">🏠</div>
            <div class="nav-icon-link p-4 mb-4 bg-slate-100 rounded-xl" onclick="showSection('sales-entry')">🛒</div>
            <div class="nav-icon-link p-4 mb-4 bg-slate-100 rounded-xl" onclick="handleLogout()">🚪</div>
        </div>

        <div class="max-w-md mx-auto min-h-screen p-6 bg-[#fcfaf7]">
            <header class="flex justify-between items-center mb-10">
                <button onclick="toggleMenu()" class="p-3 bg-[#00002A] rounded-xl border border-[#D4AF37]">☰</button>
                <div class="text-right">
                    <h1 class="text-2xl font-black text-[#00002A]">بوصلة هدايه</h1>
                    <p class="text-[10px] text-[#D4AF37] font-bold">الوعي المالي والوضوح الرقمي</p>
                </div>
                <div class="w-12 h-12 dark-card flex items-center justify-center font-black text-[#D4AF37]">H</div>
            </header>

            <div id="section-dashboard" class="space-y-4">
                <div class="dark-card stat-card">
                    <p class="text-slate-400 text-xs font-bold">إجمالي الإيرادات</p>
                    <div class="value">$<span id="display-inflow">0</span></div>
                </div>
                <div class="dark-card stat-card" style="background-color: #000035;">
                    <p class="text-slate-400 text-xs font-bold">إجمالي النفقات</p>
                    <div class="value">$<span id="display-outflow">0</span></div>
                </div>
                
                <div class="white-card mt-6">
                    <h3 class="font-black border-r-4 border-[#D4AF37] pr-3 mb-4">القيود اليومية</h3>
                    <div id="records-list" class="space-y-3 text-sm"></div>
                    <canvas id="financeChart" class="mt-6"></canvas>
                </div>
            </div>
            
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // املئي بيانات Firebase هنا
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "your-id.firebaseapp.com",
            projectId: "your-id",
            appId: "1:..."
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // وظائف الدخول
        window.handleLogin = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => {
                document.getElementById('auth-message').innerText = "خطأ في بيانات الدخول";
            });
        };

        window.handleLogout = () => signOut(auth);

        // مراقبة الحالة
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('product-content').classList.remove('hidden');
                updateUI(); // تشغيل حسابات البوصلة
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('product-content').classList.add('hidden');
            }
        });

        // --- منطق البوصلة المحاسبي (مختصر) ---
        window.toggleMenu = () => {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        };

        let records = JSON.parse(localStorage.getItem('hedaya_records_v3')) || [];
        
        window.updateUI = () => {
            let inflow = 0, outflow = 0;
            const log = document.getElementById('records-list');
            log.innerHTML = '';
            records.forEach(r => {
                if(r.type === 'sale') inflow += r.amount;
                else outflow += r.amount;
                log.innerHTML += `<div class="p-3 bg-slate-50 rounded-xl flex justify-between"><span>$${r.amount}</span><span>${r.name}</span></div>`;
            });
            document.getElementById('display-inflow').innerText = inflow.toLocaleString();
            document.getElementById('display-outflow').innerText = outflow.toLocaleString();
        };
    </script>
</body>
</html>
