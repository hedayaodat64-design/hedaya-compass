<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Compass | Hedaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-dark: #00002A;
            --gold-accent: #D4AF37;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--royal-dark);
            margin: 0;
            color: white;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 1. شاشة الرمز السري الملكية (البوابة الحامية) */
        #auth-gate-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--royal-dark);
            z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-in-out;
        }

        .logo-box-v3 {
            width: 110px; height: 110px;
            background: white; border-radius: 28px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 55px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border: 2px solid var(--gold-accent);
        }

        .logo-h-text { font-size: 55px; font-weight: 900; color: var(--royal-dark); }

        .dots-row-v3 { display: flex; gap: 18px; margin-bottom: 15px; }
        .dot-v3 { width: 12px; height: 12px; background-color: #4B5563; border-radius: 2px; transition: 0.3s; }
        .dot-v3.active { background-color: #D1D5DB; box-shadow: 0 0 10px rgba(209, 213, 219, 0.5); }

        .input-underline-v3 {
            width: 180px; border-bottom: 2px solid var(--gold-accent);
            margin-bottom: 40px; position: relative;
        }

        #pin-input-v3 {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; background: transparent; border: none; outline: none;
            color: transparent; cursor: default;
        }

        .gold-btn-v3 {
            background-color: var(--gold-accent); color: var(--royal-dark);
            font-weight: 900; font-size: 18px; padding: 12px 70px;
            border-radius: 25px; cursor: pointer; border: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .gold-btn-v3:active { transform: scale(0.95); }

        /* 2. واجهة البوصلة (التصميم الأصلي - لا تغيير) */
        #compass-ui-v3 {
            display: none; width: 100%; min-height: 100vh;
            background-color: #F8FAFB; color: var(--royal-dark);
            overflow-y: auto;
        }

        .original-header {
            background: white; padding: 25px; border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex; justify-content: space-between; align-items: center;
        }

        .original-card {
            background: var(--royal-dark); margin: 20px; padding: 32px;
            border-radius: 35px; position: relative; overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .orig-label { color: #9CA3AF; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .orig-value { color: var(--gold-accent); font-size: 40px; font-weight: 900; margin-top: 10px; }
        .orig-id { position: absolute; top: 25px; left: 25px; color: rgba(255,255,255,0.08); font-family: monospace; font-size: 10px; }

        .orig-history-title { font-weight: 900; font-size: 18px; margin: 24px 24px 15px; border-right: 4px solid var(--gold-accent); padding-right: 12px; }

        .orig-empty-state {
            background: white; border-radius: 40px; padding: 60px 20px;
            text-align: center; border: 2px dashed #E2E8F0; margin: 0 20px 20px;
        }
    </style>
</head>
<body>

    <!-- 1. شاشة الدخول (البوابة) -->
    <div id="auth-gate-screen">
        <div class="logo-box-v3">
            <span class="logo-h-text">H</span>
        </div>
        <div class="dots-row-v3" id="dots-container-v3">
            <div class="dot-v3"></div><div class="dot-v3"></div><div class="dot-v3"></div><div class="dot-v3"></div>
        </div>
        <div class="input-underline-v3">
            <input type="password" id="pin-input-v3" inputmode="numeric" maxlength="4" autofocus>
        </div>
        <button class="gold-btn-v3" onclick="checkHedayaAccess()">دخول</button>
    </div>

    <!-- 2. واجهة البوصلة (التصميم الأصلي) -->
    <div id="compass-ui-v3">
        <header class="original-header">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#00002A] rounded-2xl flex items-center justify-center text-[#D4AF37] font-black text-xl shadow-lg">H</div>
                <div>
                    <h1 class="text-xl font-black text-[#00002A]">بوصلة هدايه</h1>
                    <p class="text-[9px] text-[#D4AF37] font-bold uppercase tracking-widest">السيادة المالية والوفرة</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center border border-slate-100">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00002A" stroke-width="3"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
        </header>

        <main class="mt-4">
            <!-- إجمالي الإيرادات -->
            <div class="original-card">
                <div class="orig-id">INC-100</div>
                <p class="orig-label">إجمالي الإيرادات</p>
                <div class="orig-value">$0</div>
            </div>

            <!-- إجمالي النفقات -->
            <div class="original-card">
                <div class="orig-id">EXP-200</div>
                <p class="orig-label">إجمالي النفقات</p>
                <div class="orig-value text-red-500">$0</div>
            </div>

            <div class="orig-history-title text-[#00002A]">آخر العمليات السيادية</div>
            <div class="orig-empty-state">
                <p class="text-slate-400 font-bold">بانتظار تسجيل أولى خطواتكِ في عالم الوفرة..</p>
            </div>
        </main>
    </div>

    <script>
        const pinIn = document.getElementById('pin-input-v3');
        const dots = document.querySelectorAll('.dot-v3');

        // تحديث النقاط البصرية
        pinIn.addEventListener('input', (e) => {
            const val = e.target.value;
            dots.forEach((dot, index) => {
                if (index < val.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
            // دخول تلقائي عند اكتمال الرمز
            if (val.length === 4) setTimeout(checkHedayaAccess, 300);
        });

        function checkHedayaAccess() {
            if (pinIn.value === "2026") {
                const gate = document.getElementById('auth-gate-screen');
                gate.style.opacity = '0';
                setTimeout(() => {
                    gate.style.display = 'none';
                    document.getElementById('compass-ui-v3').style.display = 'block';
                    document.body.style.backgroundColor = "#F8FAFB";
                    document.body.style.overflow = "auto";
                }, 500);
            } else {
                if(pinIn.value.length === 4) {
                    alert("الرمز غير صحيح يا مديرة هدايه");
                    pinIn.value = '';
                    dots.forEach(d => d.classList.remove('active'));
                }
            }
        }

        // تفاعل شاشة الدخول
        document.getElementById('auth-gate-screen').addEventListener('click', () => pinIn.focus());
        window.onload = () => pinIn.focus();
    </script>
</body>
</html>
