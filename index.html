<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوصلة هدايه - التصميم الأصلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* سأضع هنا نفس الستايلات التي صممتِها أنتِ بالضبط */
        body { font-family: 'Cairo', sans-serif; background-color: #fcfaf7; color: #1a1a1a; margin: 0; overflow-x: hidden; }
        :root { --royal-blue: #00002A; --gold-primary: #D4AF37; --gold-light: #F1E5AC; --gold-dark: #AA8831; --deep-sea: #1A3F75; }
        .gold-text { color: var(--gold-primary); }
        .dark-card { background-color: var(--royal-blue); color: white; border-radius: 40px; border: 1px solid var(--gold-primary); }
        #side-menu { transition: transform 0.4s; transform: translateX(100%); }
        #side-menu.open { transform: translateX(0); }
        .menu-btn { width: 50px; height: 50px; background: var(--royal-blue); border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; border: 1px solid var(--gold-primary); }
        .menu-btn div { width: 25px; height: 3px; background: var(--gold-primary); border-radius: 2px; }
        .nav-icon-link { width: 60px; height: 60px; background: var(--deep-sea); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; color: var(--gold-light); transition: 0.3s; cursor: pointer; }
        .nav-icon-link.active { background: var(--gold-primary); color: var(--royal-blue); box-shadow: 0 0 15px var(--gold-primary); }
        .stat-card { padding: 30px 30px; margin-bottom: 15px; position: relative; box-shadow: 0 20px 40px rgba(0,0,42,0.3); overflow: hidden; transition: transform 0.3s ease; }
        .stat-card .value { font-size: 34px; font-weight: 900; color: var(--gold-primary); }
        .white-card { background: white; border-radius: 35px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .btn-action { background: linear-gradient(135deg, var(--royal-blue) 0%, var(--deep-sea) 100%); color: var(--gold-primary); font-weight: 900; padding: 12px; border-radius: 15px; width: 100%; border: 1px solid var(--gold-primary); }
        .record-item { transition: all 0.3s ease; border-right: 4px solid var(--gold-primary); }
    </style>
</head>
<body>
    <div id="overlay" class="fixed inset-0 bg-black/60 hidden z-[90]" onclick="toggleMenu()"></div>

    <div id="side-menu" class="fixed top-0 right-0 h-full w-[100px] bg-white shadow-2xl z-[100] flex flex-col items-center pt-24 border-l border-gold-primary">
        <div class="nav-icon-link active" onclick="showSection('dashboard', this)">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </div>
        <div class="nav-icon-link" onclick="showSection('manual-entry', this)">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
    </div>

    <div class="max-w-md mx-auto min-h-screen p-6 relative">
        <header class="flex justify-between items-center mb-10">
            <div class="menu-btn" onclick="toggleMenu()"><div></div><div></div><div></div></div>
            <div class="text-right">
                <h1 class="text-2xl font-black text-[#00002A]">بوصلة هدايه</h1>
                <p class="text-[11px] text-[#D4AF37] font-bold">الوعي المالي والوضوح الرقمي</p>
            </div>
        </header>

        <div id="section-dashboard" class="space-y-4">
            <div class="dark-card stat-card">
                <p class="text-slate-400 text-xs">إجمالي الإيرادات</p>
                <div class="value mt-1">$<span id="display-inflow">0</span></div>
            </div>
            
            <div class="white-card mt-6">
                <h3 class="font-black border-r-4 border-[#D4AF37] pr-3 mb-4 text-lg">القيود اليومية</h3>
                <div id="records-list" class="space-y-3 text-sm"></div>
            </div>
        </div>
        
        <div id="section-manual-entry" class="hidden space-y-6">
            <div class="white-card">
                <h2 class="text-xl font-black mb-6 text-[#D4AF37]">تسجيل قيد محاسبي</h2>
                <div class="space-y-4">
                    <input type="number" id="entry-amount" placeholder="القيمة النقدية" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="text" id="entry-desc" placeholder="وصف القيد" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <button class="btn-action py-4" onclick="addManual()">إتمام القيد وحفظه محلياً</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // الكود البرمجي الذي يحفظ البيانات في جهاز العميل فقط (لحماية الخصوصية)
        let records = JSON.parse(localStorage.getItem('hedaya_records_v3')) || [];

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function showSection(id, element) {
            document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
            updateUI();
        }

        function addManual() {
            const amount = parseFloat(document.getElementById('entry-amount').value) || 0;
            const desc = document.getElementById('entry-desc').value || 'قيد تسوية';
            if(amount <= 0) return;

            records.unshift({ name: desc, amount: amount, date: new Date().toISOString() });
            localStorage.setItem('hedaya_records_v3', JSON.stringify(records));
            showSection('dashboard');
        }

        function updateUI() {
            const log = document.getElementById('records-list');
            let total = 0;
            log.innerHTML = '';
            records.forEach(r => {
                total += r.amount;
                log.innerHTML += `<div class="record-item flex justify-between p-4 bg-white rounded-2xl shadow-sm">
                    <span class="font-black">$${r.amount}</span>
                    <span class="font-bold text-[#1A3F75]">${r.name}</span>
                </div>`;
            });
            document.getElementById('display-inflow').innerText = total.toLocaleString();
        }

        document.addEventListener('DOMContentLoaded', updateUI);
    </script>
</body>
</html>
