<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوصلة هدايه - الإصدار المحاسبي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fcfaf7;
            color: #1a1a1a;
            margin: 0;
            overflow-x: hidden;
        }
        :root {
            --royal-blue: #00002A;
            --gold-primary: #D4AF37;
            --gold-light: #F1E5AC;
            --gold-dark: #AA8831;
            --deep-sea: #1A3F75;
        }

        .gold-text { color: var(--gold-primary); }
        .dark-card { background-color: var(--royal-blue); color: white; border-radius: 40px; border: 1px solid var(--gold-primary); }
        
        #side-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #side-menu.open { transform: translateX(0); }

        .menu-btn {
            width: 50px; height: 50px; background: var(--royal-blue);
            border-radius: 15px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 5px;
            cursor: pointer; border: 1px solid var(--gold-primary);
        }
        .menu-btn div { width: 25px; height: 3px; background: var(--gold-primary); border-radius: 2px; }

        .nav-icon-link {
            width: 60px; height: 60px; background: var(--deep-sea);
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; margin-bottom: 20px; color: var(--gold-light);
            transition: 0.3s; cursor: pointer;
        }
        .nav-icon-link.active { background: var(--gold-primary); color: var(--royal-blue); box-shadow: 0 0 15px var(--gold-primary); }

        .stat-card {
            padding: 30px 30px; margin-bottom: 15px; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,42,0.3); overflow: hidden;
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card .value { font-size: 34px; font-weight: 900; color: var(--gold-primary); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .stat-card.expense-card .value { color: #ff6b6b; }

        .white-card {
            background: white; border-radius: 35px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        
        .btn-action {
            background: linear-gradient(135deg, var(--royal-blue) 0%, var(--deep-sea) 100%);
            color: var(--gold-primary); font-weight: 900; padding: 12px;
            border-radius: 15px; width: 100%; margin-top: 10px; transition: 0.3s;
            border: 1px solid var(--gold-primary);
        }

        .record-item { transition: all 0.3s ease; border-right: 4px solid var(--gold-primary); }
        .record-item:hover { background-color: #fdfaf0; transform: translateX(-5px); }
        
        .accounting-code { font-size: 7px; opacity: 0.5; color: var(--gold-primary); display: block; margin-top: -2px; letter-spacing: 1px; }
        
        /* شاشة القفل */
        #auth-screen {
            position: fixed; inset: 0; background: var(--royal-blue); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="auth-screen">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center text-4xl font-black text-[#00002A] mb-6 border-2 border-[#D4AF37]">H</div>
        <input type="password" id="pin" class="bg-transparent border-b-2 border-[#D4AF37] text-white text-3xl text-center outline-none mb-8 tracking-widest w-40" placeholder="••••">
        <button onclick="login()" class="px-12 py-3 bg-[#D4AF37] text-[#00002A] rounded-full font-black">دخول</button>
    </div>

    <div id="app" class="hidden">
        <div id="overlay" class="fixed inset-0 bg-black/60 hidden z-[90]" onclick="toggleMenu()"></div>

        <!-- Side Menu -->
        <div id="side-menu" class="fixed top-0 right-0 h-full w-[100px] bg-white shadow-2xl z-[100] flex flex-col items-center pt-24 border-l border-gold-primary">
            <div class="nav-icon-link active" title="لوحة التحكم" onclick="showSection('dashboard', this)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <div class="nav-icon-link" title="القيود اليدوية" onclick="showSection('manual-entry', this)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>
            <div class="nav-icon-link" title="المبيعات" onclick="showSection('sales-entry', this)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            </div>
            <div class="nav-icon-link" title="التحليل" onclick="showSection('profit-calc', this)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
            </div>
            <div class="nav-icon-link" title="الميزانية" onclick="showSection('sovereign', this)">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            </div>
        </div>

        <div class="max-w-md mx-auto min-h-screen p-6 relative">
            <header class="flex justify-between items-center mb-10">
                <div class="menu-btn" onclick="toggleMenu()">
                    <div></div><div></div><div></div>
                </div>
                <div class="text-right">
                    <h1 class="text-2xl font-black text-[#00002A]">بوصلة هدايه</h1>
                    <p class="text-[11px] text-[#D4AF37] font-bold uppercase tracking-widest">الوعي المالي والوضوح الرقمي</p>
                </div>
                <div class="w-14 h-14 dark-card flex items-center justify-center text-2xl font-black text-[#D4AF37] border-2 border-[#D4AF37] shadow-lg">H</div>
            </header>

            <!-- DASHBOARD SECTION -->
            <div id="section-dashboard" class="space-y-4">
                <div class="dark-card stat-card border-gold-primary">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-tighter">إجمالي الإيرادات</p>
                            <div class="value mt-1">$<span id="display-inflow">0</span></div>
                        </div>
                        <span class="accounting-code opacity-30 mt-1">INC-100</span>
                    </div>
                </div>

                <div class="dark-card stat-card border-gold-primary expense-card" style="background-color: #000035;">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-tighter">إجمالي النفقات</p>
                            <div class="value mt-1">$<span id="display-outflow">0</span></div>
                        </div>
                        <span class="accounting-code opacity-30 mt-1">EXP-200</span>
                    </div>
                </div>
                
                <div class="white-card mt-6">
                    <h3 class="font-black border-r-4 border-[#D4AF37] pr-3 mb-4 text-lg text-[#00002A]">القيود المحفوظة</h3>
                    <div id="records-list" class="space-y-3 text-sm mb-6"></div>

                    <div id="chart-container" class="mt-8 border-t border-amber-100 pt-6">
                        <h3 class="font-black text-center mb-4 text-amber-800/60 text-xs uppercase tracking-widest">تحليل المركز المالي</h3>
                        <div style="position: relative; height:280px; width:100%">
                            <canvas id="financeChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PROFIT CALCULATOR (تحليل العملاء والربح) -->
            <div id="section-profit-calc" class="hidden space-y-6">
                <div class="white-card">
                    <h2 class="text-xl font-black mb-4 text-[#D4AF37]">تحليل الربحية</h2>
                    <div class="space-y-4">
                        <input type="text" id="calc-client" placeholder="اسم العميل" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-[#D4AF37]">
                        <input type="number" id="calc-cost" oninput="calcProfit()" placeholder="تكلفة المنتج" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        <input type="number" id="calc-price" oninput="calcProfit()" placeholder="سعر البيع" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        <div class="p-6 bg-amber-50 rounded-3xl flex justify-between items-center border border-amber-100">
                            <div>
                                <p class="text-xs text-amber-700 font-bold">صافي الربح</p>
                                <span class="text-2xl font-black text-[#00002A]">$<span id="calc-net">0</span></span>
                            </div>
                            <div class="text-left">
                                <p class="text-xs text-amber-700 font-bold">هامش الربح</p>
                                <span id="calc-margin" class="text-xl font-black text-[#D4AF37]">0%</span>
                            </div>
                        </div>
                        <button class="btn-action shadow-lg py-4" onclick="saveCalc()">اعتماد في القيود والعملاء</button>
                    </div>
                </div>
            </div>

            <!-- SALES ENTRY -->
            <div id="section-sales-entry" class="hidden space-y-6">
                <div class="white-card">
                    <h2 class="text-xl font-black mb-6 text-[#D4AF37]">تسجيل حركة تجارية</h2>
                    <div class="space-y-4">
                        <select id="sale-type" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-[#00002A]">
                            <option value="sale">إيرادات (+)</option>
                            <option value="purchase">نفقات (-)</option>
                        </select>
                        <input type="text" id="party-name" placeholder="العميل / المورد" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="item-qty" placeholder="الكمية" class="p-4 bg-slate-50 rounded-2xl outline-none">
                            <input type="number" id="item-price" placeholder="سعر الوحدة" class="p-4 bg-slate-50 rounded-2xl outline-none">
                        </div>
                        <button class="btn-action py-4" onclick="addTrade()">ترحيل القيد</button>
                    </div>
                </div>
            </div>

            <!-- MANUAL ENTRY -->
            <div id="section-manual-entry" class="hidden space-y-6">
                <div class="white-card">
                    <h2 class="text-xl font-black mb-6 text-[#D4AF37]">تسجيل قيد محاسبي</h2>
                    <div class="space-y-4">
                        <select id="entry-target" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                            <option value="asset">الأصول</option>
                            <option value="liab">الالتزامات</option>
                            <option value="equity">حقوق الملكية</option>
                        </select>
                        <input type="number" id="entry-amount" placeholder="القيمة النقدية" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        <input type="text" id="entry-desc" placeholder="وصف القيد" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        <button class="btn-action py-4" onclick="addManual()">إتمام القيد</button>
                    </div>
                </div>
            </div>

            <!-- BALANCE SHEET -->
            <div id="section-sovereign" class="hidden space-y-6">
                <h2 class="text-2xl font-black mb-4 text-[#00002A]">الميزانية العمومية</h2>
                <div class="white-card border-r-8 border-[#00002A] flex justify-between items-center mb-2">
                    <div><span class="font-black text-lg">الأصول</span><span class="accounting-code">1000</span></div>
                    <span id="asset-total" class="font-black text-xl text-[#00002A]">$0</span>
                </div>
                <div class="white-card border-r-8 border-[#1A3F75] flex justify-between items-center mb-2">
                    <div><span class="font-black text-lg">الالتزامات</span><span class="accounting-code">2000</span></div>
                    <span id="liab-total" class="font-black text-xl text-[#1A3F75]">$0</span>
                </div>
                <div class="white-card border-r-8 border-[#D4AF37] flex justify-between items-center mb-2">
                    <div><span class="font-black text-lg">حقوق الملكية</span><span class="accounting-code">3000</span></div>
                    <span id="equity-total" class="font-black text-xl text-[#D4AF37]">$0</span>
                </div>
                <p id="balance-status" class="text-center text-[10px] font-bold mt-4"></p>
            </div>
        </div>
    </div>

    <script>
        const MASTER_PIN = "2026";
        // نظام التخزين: استعادة السجل المحفوظ أو إنشاء مصفوفة فارغة
        let records = JSON.parse(localStorage.getItem('hedaya_records_sovereign')) || [];
        let myChart = null;

        function login() {
            if(document.getElementById('pin').value === MASTER_PIN) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                updateUI();
            } else {
                alert("كود العبور غير صحيح");
            }
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function showSection(id, element) {
            document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('section-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-icon-link').forEach(link => link.classList.remove('active'));
            if(element) element.classList.add('active');
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu();
            updateUI();
        }

        function calcProfit() {
            const cost = parseFloat(document.getElementById('calc-cost').value) || 0;
            const price = parseFloat(document.getElementById('calc-price').value) || 0;
            const net = price - cost;
            const margin = price > 0 ? (net / price) * 100 : 0;
            document.getElementById('calc-net').innerText = net.toLocaleString();
            document.getElementById('calc-margin').innerText = margin.toFixed(1) + "%";
        }

        function saveCalc() {
            const client = document.getElementById('calc-client').value || 'عميل مجهول';
            const price = parseFloat(document.getElementById('calc-price').value) || 0;
            const cost = parseFloat(document.getElementById('calc-cost').value) || 0;
            if(price <= 0) return;

            addRecord({
                name: client,
                amount: price,
                cost: cost,
                type: 'sale',
                category: 'مبيعات عملاء',
                date: new Date().toISOString()
            });
            showSection('dashboard', document.querySelector('.nav-icon-link:first-child'));
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function addTrade() {
            const type = document.getElementById('sale-type').value;
            const name = document.getElementById('party-name').value || 'عملية تجارية';
            const qty = parseFloat(document.getElementById('item-qty').value) || 1;
            const price = parseFloat(document.getElementById('item-price').value) || 0;
            if(price <= 0) return;

            addRecord({
                name: name,
                amount: qty * price,
                type: type,
                category: type === 'sale' ? 'إيرادات' : 'نفقات',
                date: new Date().toISOString()
            });
            showSection('dashboard', document.querySelector('.nav-icon-link:first-child'));
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function addManual() {
            const target = document.getElementById('entry-target').value;
            const amount = parseFloat(document.getElementById('entry-amount').value) || 0;
            const desc = document.getElementById('entry-desc').value || 'قيد تسوية';
            if(amount <= 0) return;

            addRecord({
                name: desc,
                amount: amount,
                type: 'manual',
                target: target,
                category: 'تسوية محاسبية',
                date: new Date().toISOString()
            });
            showSection('dashboard', document.querySelector('.nav-icon-link:first-child'));
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function addRecord(record) {
            records.unshift(record);
            localStorage.setItem('hedaya_records_sovereign', JSON.stringify(records));
            updateUI();
        }

        function deleteRecord(index) {
            if(confirm("هل تريد حذف هذا القيد؟")) {
                records.splice(index, 1);
                localStorage.setItem('hedaya_records_sovereign', JSON.stringify(records));
                updateUI();
            }
        }

        function updateUI() {
            let inflow = 0, outflow = 0, assets = 0, liabs = 0, equity = 0;
            const log = document.getElementById('records-list');
            if (log) log.innerHTML = '';

            records.forEach((r, index) => {
                if(r.type === 'sale') {
                    inflow += r.amount;
                    assets += r.amount; // المبيعات تزيد الأصول
                    if(r.cost) {
                        outflow += r.cost;
                        assets -= r.cost; // خصم التكلفة من الأصول
                        equity += (r.amount - r.cost); // الربح يزيد حقوق الملكية
                    } else {
                        equity += r.amount;
                    }
                } else if(r.type === 'purchase') {
                    outflow += r.amount;
                    assets -= r.amount;
                    equity -= r.amount;
                } else if(r.type === 'manual') {
                    if(r.target === 'asset') assets += r.amount;
                    if(r.target === 'liab') liabs += r.amount;
                    if(r.target === 'equity') equity += r.amount;
                }

                if (log && index < 10) { // عرض آخر 10 قيود
                    const time = new Date(r.date).toLocaleDateString('ar-EG');
                    const div = document.createElement('div');
                    div.className = "record-item flex justify-between items-center p-4 bg-white rounded-2xl shadow-sm border border-slate-50";
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <button onclick="deleteRecord(${index})" class="text-red-300">✕</button>
                            <span class="font-black text-[#00002A]">$${r.amount.toLocaleString()}</span>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-[#1A3F75]">${r.name}</p>
                            <p class="text-[9px] text-amber-600/70 font-bold uppercase">${time} | ${r.category}</p>
                        </div>
                    `;
                    log.appendChild(div);
                }
            });

            document.getElementById('display-inflow').innerText = inflow.toLocaleString();
            document.getElementById('display-outflow').innerText = outflow.toLocaleString();
            document.getElementById('asset-total').innerText = `$${assets.toLocaleString()}`;
            document.getElementById('liab-total').innerText = `$${liabs.toLocaleString()}`;
            document.getElementById('equity-total').innerText = `$${equity.toLocaleString()}`;

            const balanceStatus = document.getElementById('balance-status');
            if(assets === (liabs + equity)) {
                balanceStatus.innerText = "المعادلة المحاسبية متوازنة ✅";
                balanceStatus.className = "text-center text-[10px] font-bold mt-4 text-green-600";
            } else {
                balanceStatus.innerText = "تنبيه: يوجد عدم توازن في القيود ⚠️";
                balanceStatus.className = "text-center text-[10px] font-bold mt-4 text-red-600";
            }

            renderChart(inflow, outflow, assets, liabs, equity);
        }

        function renderChart(inf, out, ast, lib, eq) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['أصول', 'خصوم', 'حقوق', 'إيراد'],
                    datasets: [{
                        data: [ast || 1, lib || 0, eq || 0, inf || 0],
                        backgroundColor: ['#00002A', '#1A3F75', '#D4AF37', '#7DA0CA'],
                        borderWidth: 0
                    }]
                },
                options: {
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { font: { family: 'Cairo', size: 10 } } } }
                }
            });
        }
    </script>
</body>
</html>
