<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedaya Compass</title>
    <style>
        body { 
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            color: #d4af37;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 20px;
            border: 1px solid #d4af37;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 320px;
        }
        h2 { font-size: 24px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: transparent; border: 1px solid #555;
            color: white; border-radius: 8px; outline: none;
        }
        input:focus { border-color: #d4af37; }
        button {
            width: 100%; padding: 12px; margin-top: 20px;
            background: #d4af37; color: black; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #f2d06b; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h2>HEDAYA COMPASS</h2>
        <form action="ضعي_الرابط_هنا" method="POST">
            <input type="text" name="name" placeholder="الاسم" required>
            <input type="email" name="email" placeholder="الإيميل" required>
            <button type="submit">إرسال وحفظ</button>
        </form>
    </div>
</body>
</html>
